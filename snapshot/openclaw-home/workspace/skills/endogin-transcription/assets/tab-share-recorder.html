<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <title>Endogin Tab Share Recorder</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; max-width: 800px; margin: 0 auto; }
    button { padding: 10px 16px; margin-right: 8px; }
    #status { margin: 16px 0; white-space: pre-wrap; }
    textarea { width: 100%; height: 220px; }
  </style>
</head>
<body>
  <h1>Endogin Tab Share Recorder</h1>
  <p>Escolha a aba da Endogin e marque a opção de compartilhar áudio da aba.</p>
  <button id="start">Iniciar captura</button>
  <button id="download" disabled>Baixar WEBM</button>
  <div id="status">idle</div>
  <textarea id="payload" placeholder="Base64 output"></textarea>
  <script>
    const statusEl = document.getElementById('status');
    const payloadEl = document.getElementById('payload');
    const startBtn = document.getElementById('start');
    const downloadBtn = document.getElementById('download');
    const params = new URLSearchParams(location.search);
    const seconds = Number(params.get('seconds') || '15');
    let blobRef = null;

    function setStatus(value) {
      statusEl.textContent = value;
    }

    function blobToBase64(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = reject;
        reader.onloadend = () => {
          const result = String(reader.result || '');
          const marker = ';base64,';
          const idx = result.indexOf(marker);
          resolve(idx >= 0 ? result.slice(idx + marker.length) : '');
        };
        reader.readAsDataURL(blob);
      });
    }

    startBtn.onclick = async () => {
      try {
        setStatus('Solicitando compartilhamento da aba...');
        const stream = await navigator.mediaDevices.getDisplayMedia({
          video: true,
          audio: true
        });
        const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp8,opus')
          ? 'video/webm;codecs=vp8,opus'
          : 'video/webm';
        const recorder = new MediaRecorder(stream, { mimeType });
        const chunks = [];
        recorder.ondataavailable = (event) => {
          if (event.data && event.data.size) chunks.push(event.data);
        };
        recorder.start(1000);
        setStatus(`Gravando ${seconds}s...`);
        await new Promise((resolve) => setTimeout(resolve, seconds * 1000));
        recorder.stop();
        await new Promise((resolve) => { recorder.onstop = resolve; });
        stream.getTracks().forEach((t) => t.stop());
        blobRef = new Blob(chunks, { type: mimeType });
        payloadEl.value = await blobToBase64(blobRef);
        downloadBtn.disabled = false;
        setStatus('done');
      } catch (err) {
        setStatus('error: ' + err.message);
      }
    };

    downloadBtn.onclick = () => {
      if (!blobRef) return;
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blobRef);
      a.download = 'endogin-capture.webm';
      a.click();
    };
  </script>
</body>
</html>
