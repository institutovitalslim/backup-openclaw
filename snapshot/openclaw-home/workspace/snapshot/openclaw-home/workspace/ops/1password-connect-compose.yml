version: '3.7'
services:
  connect-api:
    image: 1password/connect-api:latest
    restart: unless-stopped
    environment:
      - OP_CONNECT_TOKEN=${OP_CONNECT_TOKEN}
    ports:
      - "8080:8080"
    volumes:
      - ./connect-data:/var/lib/onepassword

  connect-sync:
    image: 1password/connect-sync:latest
    restart: unless-stopped
    environment:
      - OP_CONNECT_TOKEN=${OP_CONNECT_TOKEN}
    volumes:
      - ./connect-data:/var/lib/onepassword

# Note: do NOT commit OP_CONNECT_TOKEN to version control. Use /root/.openclaw/connect.env
